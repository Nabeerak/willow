openapi: 3.0.0
info:
  title: Willow Admin API
  description: Admin endpoints for session management and Sovereign Truth curation
  version: 1.0.0

servers:
  - url: https://willow.run.app/api/v1/admin
    description: Google Cloud Run admin endpoint

paths:
  /session/{session_id}/state:
    get:
      summary: Get session state
      description: Retrieve current behavioral state and Residual Plot for debugging
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session state retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStateResponse'
        '404':
          description: Session not found

  /session/{session_id}/history:
    get:
      summary: Get conversation history
      description: Retrieve all turns for a session
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Conversation history retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  turns:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationalTurn'

  /sovereign-truths:
    get:
      summary: List Sovereign Truths
      description: Get all curated truths in the Owned Plot
      responses:
        '200':
          description: Sovereign truths retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  truths:
                    type: array
                    items:
                      $ref: '#/components/schemas/SovereignTruth'

    post:
      summary: Add Sovereign Truth
      description: Curate a new truth (requires admin auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - assertion
              properties:
                key:
                  type: string
                assertion:
                  type: string
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
      responses:
        '201':
          description: Sovereign truth created
        '400':
          description: Invalid request (duplicate key or invalid priority)

  /sovereign-truths/{key}:
    put:
      summary: Update Sovereign Truth
      description: Modify an existing truth
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assertion:
                  type: string
                priority:
                  type: integer
                  minimum: 1
                  maximum: 10
      responses:
        '200':
          description: Sovereign truth updated
        '404':
          description: Truth not found

    delete:
      summary: Delete Sovereign Truth
      description: Remove a truth from the Owned Plot
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Sovereign truth deleted
        '404':
          description: Truth not found

  /metrics/latency:
    get:
      summary: Get tier latency metrics
      description: Aggregate latency statistics per tier
      parameters:
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Latency metrics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatencyMetrics'

components:
  schemas:
    SessionStateResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        current_m:
          type: number
          format: float
        base_decay:
          type: number
          format: float
        turn_count:
          type: integer
        sovereign_spike_count:
          type: integer
        cold_start_active:
          type: boolean
        residual_plot:
          type: object
          properties:
            weighted_average_m:
              type: number
              format: float
            turns:
              type: array
              maxItems: 5
              items:
                $ref: '#/components/schemas/ConversationalTurn'

    ConversationalTurn:
      type: object
      properties:
        turn_id:
          type: integer
        user_input:
          type: string
        agent_response:
          type: string
        thought_signature:
          $ref: '#/components/schemas/ThoughtSignature'
        m_modifier:
          type: number
          format: float
        timestamp:
          type: string
          format: date-time
        tier_latencies:
          type: object
          properties:
            tier1_ms:
              type: number
            tier2_ms:
              type: number
            tier3_ms:
              type: number
            tier4_ms:
              type: number

    ThoughtSignature:
      type: object
      properties:
        intent:
          type: string
          enum: [collaborative, neutral, hostile, devaluing, insightful]
        tone:
          type: string
          enum: [warm, casual, formal, sarcastic, aggressive]
        detected_tactic:
          type: string
          nullable: true
          enum: [soothing, mirroring, gaslighting, deflection, contextual_sarcasm, null]
        m_modifier:
          type: number
          format: float
        tier_trigger:
          type: integer
          nullable: true
          enum: [3, 4, null]
        rationale:
          type: string

    SovereignTruth:
      type: object
      properties:
        key:
          type: string
        assertion:
          type: string
        priority:
          type: integer
          minimum: 1
          maximum: 10
        created_at:
          type: string
          format: date-time

    LatencyMetrics:
      type: object
      properties:
        tier1:
          $ref: '#/components/schemas/TierStats'
        tier2:
          $ref: '#/components/schemas/TierStats'
        tier3:
          $ref: '#/components/schemas/TierStats'
        tier4:
          $ref: '#/components/schemas/TierStats'

    TierStats:
      type: object
      properties:
        p50_ms:
          type: number
        p95_ms:
          type: number
        p99_ms:
          type: number
        max_ms:
          type: number
        total_calls:
          type: integer
        budget_violations:
          type: integer
          description: Number of times tier exceeded latency budget

  securitySchemes:
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - AdminAuth: []
