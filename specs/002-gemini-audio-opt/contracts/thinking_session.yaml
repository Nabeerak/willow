title: Gemini Live Thinking Session Configuration
version: "1.0"
feature: 002-gemini-audio-opt
date: 2026-03-02

description: |
  Defines the thinking configuration contract for the Gemini Live API session
  initialization. These parameters are added to LiveConnectConfig at the start
  of every StreamingSession.connect() call.

# ─────────────────────────────────────────────────────────────────────────────
# Integration Point
# ─────────────────────────────────────────────────────────────────────────────

integration:
  file: src/voice/gemini_live.py
  class: StreamingSession
  method: connect()
  line_range: "334–349 (LiveConnectConfig construction)"

# ─────────────────────────────────────────────────────────────────────────────
# ThinkingConfig Parameters
# ─────────────────────────────────────────────────────────────────────────────

thinking_config:
  class: google.genai.types.ThinkingConfig
  field_on_LiveConnectConfig: thinking_config

  parameters:
    thinking_level:
      type: google.genai.types.ThinkingLevel
      value: ThinkingLevel.MINIMAL
      string_value: "MINIMAL"
      description: |
        MINIMAL level: lowest reasoning overhead. The model may reason for complex
        turns without activating a separate "deep thinking" mode, avoiding the
        latency spike of switching reasoning modes mid-conversation.
      alternatives_rejected:
        - value: ThinkingLevel.HIGH
          reason: Excessive token cost and latency for routine conversational turns
        - value: thinking_budget=0
          reason: Disables reasoning entirely — spec requires on-demand capability
        - value: thinking_budget=-1 (AUTOMATIC)
          reason: Unpredictable latency and cost; MINIMAL level is more controlled

    include_thoughts:
      type: bool
      value: true
      description: |
        When True, the model's reasoning traces appear as separate Part objects
        in the response where part.thought == True. This allows the response
        handler to filter or log reasoning separately from surface text.
        Required by the spec to retain reasoning visibility for debugging.

# ─────────────────────────────────────────────────────────────────────────────
# Model Requirements
# ─────────────────────────────────────────────────────────────────────────────

model_requirements:
  required_model_family: "gemini-2.5-series or later"
  examples:
    - "gemini-2.5-flash-preview-04-17"
    - "gemini-2.5-pro-preview"
  current_default: "gemini-2.0-flash-exp"  # Does NOT support thinking
  action_required: |
    Update StreamingSession.__init__() default model_id from "gemini-2.0-flash-exp"
    to a 2.5-series model. Make model_id configurable via WillowConfig or
    environment variable GEMINI_MODEL_ID to allow switching between models.
  behavior_on_unsupported_model: |
    The thinking_config field is silently ignored by the API if the model
    does not support thinking. No error is raised. This means the implementation
    must be validated against a 2.5-series model in testing.

# ─────────────────────────────────────────────────────────────────────────────
# Response Handling — Thought Parts
# ─────────────────────────────────────────────────────────────────────────────

response_handling:
  thought_part_detection: |
    When include_thoughts=True, the receive loop in _handle_server_content()
    receives Part objects where part.thought == True alongside regular text parts.
    Current implementation in gemini_live.py line 582 accumulates all part.text
    without checking part.thought — this must be updated to filter thought parts
    from the surface response accumulator.

  required_change_in_handle_server_content:
    before: |
      if part.text:
          self._accumulated_agent_response += part.text
    after: |
      if part.text and not getattr(part, 'thought', False):
          self._accumulated_agent_response += part.text
      elif part.text and getattr(part, 'thought', False):
          logger.debug(f"Thought trace: {part.text[:100]}")

# ─────────────────────────────────────────────────────────────────────────────
# Context Caching (Live API)
# ─────────────────────────────────────────────────────────────────────────────

context_caching:
  mechanism: implicit_server_side
  configuration: none_required
  description: |
    The Gemini Live API applies implicit server-side caching automatically when
    repeated prompt prefixes are detected within a session. This is zero-config
    and cannot be inspected or controlled via the Python SDK.

    Standard CachedContent (client.caches.create()) is INCOMPATIBLE with Live
    API sessions. LiveConnectConfig has no cached_content field.

    To maximize implicit caching benefit:
    - Keep the WebSocket connection alive for the full session duration
    - Do not reconnect unnecessarily (existing architecture is correct)
    - The current SESSION_TIMEOUT_SECONDS=3600 config already enables this

  cost_reduction_achievable: "partial (opaque, not measurable)"
  sc002_status: |
    SC-002 ("≥80% reduction in per-turn context cost for sessions >10 min")
    is NOT achievable via explicit caching. Metric must be revised to:
    "Session cost scales sub-linearly for long sessions (implicit caching benefit)"
    or the architecture must evolve to include a hybrid REST+Live design.

# ─────────────────────────────────────────────────────────────────────────────
# Full LiveConnectConfig with Thinking
# ─────────────────────────────────────────────────────────────────────────────

complete_config_snippet: |
  # src/voice/gemini_live.py — StreamingSession.connect()
  live_config = genai_types.LiveConnectConfig(
      response_modalities=["AUDIO"],
      thinking_config=genai_types.ThinkingConfig(
          thinking_level=genai_types.ThinkingLevel.MINIMAL,
          include_thoughts=True,
      ),
      speech_config=genai_types.SpeechConfig(
          voice_config=genai_types.VoiceConfig(
              prebuilt_voice_config=genai_types.PrebuiltVoiceConfig(
                  voice_name="Aoede"
              )
          )
      )
  )
