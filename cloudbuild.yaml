# Cloud Build configuration for Willow Behavioral Framework
# T063: Includes SHA-256 hash computation for sovereign_truths.json (FR-008j)

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/willow:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/willow:latest'
      - '.'

  # Step 3: Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/willow:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/willow:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'willow'
      - '--image=gcr.io/$PROJECT_ID/willow:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--min-instances=0'
      - '--cpu=2'
      - '--memory=4Gi'
      - '--timeout=3600s'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID'
      - '--port=8080'
      - '--update-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/willow:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/willow:latest'

timeout: '1200s'
