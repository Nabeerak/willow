<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />
  
  <style>
    .text-title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
    .text-box { font-family: sans-serif; font-size: 14px; fill: #334155; }
    .text-bold { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; }
    .text-white { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2px; rx: 8px; }
    .box-tier { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2px; rx: 8px; }
    .box-header { fill: #3b82f6; rx: 8px; }
    .arrow { stroke: #64748b; stroke-width: 2px; fill: none; }
    .arrow-head { fill: #64748b; }
  </style>

  <text x="320" y="40" class="text-title">Willow Architecture</text>

  <!-- User Input -->
  <rect x="300" y="70" width="200" height="40" class="box" />
  <text x="350" y="95" class="text-bold">User Voice Input</text>
  <path d="M 400 110 L 400 140" class="arrow" />
  <polygon points="395,135 405,135 400,145" class="arrow-head" />

  <!-- Audio Capture -->
  <rect x="250" y="150" width="300" height="80" class="box" />
  <rect x="250" y="150" width="300" height="30" class="box-header" />
  <text x="260" y="170" class="text-white">Audio Capture (Browser)</text>
  <text x="260" y="200" class="text-box">• noise-gate-processor.js</text>
  <text x="260" y="220" class="text-box">• audio_capture.js</text>

  <path d="M 400 230 L 400 260" class="arrow" />
  <polygon points="395,255 405,255 400,265" class="arrow-head" />
  <text x="410" y="250" class="text-box">WebSocket (binary audio + JSON)</text>

  <!-- WillowAgent -->
  <rect x="150" y="270" width="500" height="300" class="box" />
  <rect x="150" y="270" width="500" height="30" class="box-header" />
  <text x="160" y="290" class="text-white">WillowAgent (src/main.py)</text>

  <!-- Tier 1 -->
  <rect x="170" y="320" width="460" height="50" class="box-tier" />
  <text x="180" y="340" class="text-bold">Tier 1: Reflex (&lt;50ms)</text>
  <text x="180" y="360" class="text-box">Tone mirroring, Warm but Sharp opener</text>

  <path d="M 400 370 L 400 390" class="arrow" />
  <polygon points="395,385 405,385 400,395" class="arrow-head" />

  <!-- Tier 2 -->
  <rect x="170" y="400" width="460" height="50" class="box-tier" />
  <text x="180" y="420" class="text-bold">Tier 2: Metabolism (&lt;5ms)</text>
  <text x="180" y="440" class="text-box">State formula aₙ₊₁ = aₙ + d + m</text>

  <path d="M 400 450 L 400 470" class="arrow" />
  <polygon points="395,465 405,465 400,475" class="arrow-head" />

  <!-- Tier 3 -->
  <rect x="170" y="480" width="220" height="70" class="box-tier" />
  <text x="180" y="500" class="text-bold">Tier 3: Conscious (&lt;500ms)</text>
  <text x="180" y="520" class="text-box">Thought Signature</text>
  <text x="180" y="540" class="text-box">Tactic detection</text>

  <!-- Tier 4 -->
  <rect x="410" y="480" width="220" height="70" class="box-tier" />
  <text x="420" y="500" class="text-bold">Tier 4: Sovereign (&lt;2s)</text>
  <text x="420" y="520" class="text-box">Hard truth override</text>
  <text x="420" y="540" class="text-box">Zero LLM involvement</text>

  <!-- External Connections -->
  <path d="M 650 345 L 700 345" class="arrow" />
  <polygon points="695,340 705,345 695,350" class="arrow-head" />
  <text x="710" y="350" class="text-bold">Gemini Live API</text>

</svg>